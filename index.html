<style>
  :root{

    --line:#cdbfa0;--terracotta:#BC5B39;--gold:#C9922E;--ochre:#8C6A2E;
    --sage:#54684A;--teal:#2B5F6B;
    --confirmed-bg:#E3ECE0;--confirmed-fg:#3C5C34;
    --included-bg:#E1ECEF;--included-fg:#21515F;
    --price-bg:#F5E8D0;--price-fg:#8C631B;
    --accent:#BC5B39;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.45;}
  .wrap{max-width:640px;margin:0 auto;padding:0 18px 48px;}

  header.hero{padding:28px 18px 14px;text-align:center;}
  .hero .kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .hero h1{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-weight:600;font-size:32px;margin:6px 0 4px;color:var(--ink);}
  .hero .sub{font-size:14px;color:var(--ink-soft);margin-bottom:10px;}
  .hero .status{display:inline-block;font-size:12.5px;font-weight:700;padding:5px 14px;border-radius:999px;background:var(--cream-deep);color:var(--ink);}

  .data-bar{max-width:640px;margin:10px auto 0;padding:0 18px;display:flex;gap:8px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  .data-bar::-webkit-scrollbar{display:none;}
  .data-bar button,.data-bar a.bar-link{flex:0 0 auto;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;border:1.5px solid var(--line);background:var(--cream);color:var(--ink);cursor:pointer;transition:background .2s;text-decoration:none;display:inline-block;}
  .data-bar button:hover,.data-bar a.bar-link:hover{background:var(--cream-deep);}

  .ribbon{max-width:640px;margin:12px auto 0;padding:14px 12px 18px;overflow-x:auto;}
  .ribbon-track{display:flex;align-items:flex-start;min-width:520px;position:relative;}
  .ribbon-track::before{content:"";position:absolute;left:22px;right:22px;top:9px;height:2px;background:repeating-linear-gradient(to right,var(--line) 0,var(--line) 6px,transparent 6px,transparent 11px);}
  .ribbon-fill{position:absolute;left:22px;top:9px;height:2px;background:var(--teal);width:0;z-index:0;transition:width .8s ease;}
  .stop{flex:1;text-align:center;position:relative;z-index:1;}
  .stop .dot{width:18px;height:18px;border-radius:50%;background:var(--cream);border:2.5px solid var(--line);margin:0 auto 8px;transition:background .4s,border-color .4s,box-shadow .4s;}
  .stop .place{font-size:12.5px;font-weight:700;color:var(--ink-soft);transition:color .4s;}
  .stop .when{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
  .stop.visited .dot{background:var(--teal);border-color:var(--teal);}
  .stop.visited .place{color:var(--ink);}
  .stop.current .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 5px rgba(201,146,46,.22);animation:pulse 2.2s infinite;}
  .stop.current .place{color:var(--ink);font-weight:800;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(201,146,46,.35);}70%{box-shadow:0 0 0 9px rgba(201,146,46,0);}100%{box-shadow:0 0 0 0 rgba(201,146,46,0);}}

  nav.daynav{position:sticky;top:0;z-index:20;background:var(--cream);border-bottom:1px solid var(--line);display:flex;gap:8px;padding:10px 18px;overflow-x:auto;max-width:640px;margin:0 auto;}
  nav.daynav a{flex:0 0 auto;text-decoration:none;color:var(--ink);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1.5px solid var(--line);white-space:nowrap;transition:background .2s,color .2s,border-color .2s;}
  nav.daynav a.active{background:var(--day-accent,var(--ink));color:#fff;border-color:transparent;}
  nav.daynav a.today::after{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;margin-left:6px;vertical-align:middle;}

  section.day{scroll-margin-top:58px;margin-top:26px;}
  .day-header{background:var(--accent);color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:4px;}
  .day-header .d-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.85;}
  .day-header h2{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-size:20px;margin:3px 0 6px;font-weight:600;line-height:1.25;}
  .day-header .stay{font-size:12.5px;opacity:.92;}

  .timeline{position:relative;margin-top:6px;padding-left:32px;}
  .timeline::before{content:"";position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:var(--line);}
  .item{position:relative;padding:14px 0 14px 16px;border-bottom:1px dashed var(--line);transition:opacity .4s;}
  .item:last-child{border-bottom:none;}
  .item .node{position:absolute;left:-22px;top:13px;width:22px;height:22px;border-radius:50%;background:var(--cream);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;}
  .item .title{font-size:15px;color:var(--ink);display:flex;align-items:baseline;flex-wrap:wrap;line-height:1.35;}
  .item .title .time-tag{font-family:ui-monospace,"SF Mono","Roboto Mono","Courier New",monospace;font-size:13px;font-weight:700;color:var(--accent);margin-right:6px;white-space:nowrap;flex-shrink:0;}
  .item .title .title-text{font-weight:700;}
  .item .meta-row{margin-top:5px;font-size:12.5px;color:var(--ink-soft);display:flex;flex-wrap:wrap;gap:5px 10px;}
  .item .meta-row span{display:inline-flex;align-items:center;gap:4px;}
  .item .meta-row a{color:var(--teal);text-decoration:none;border-bottom:1px solid currentColor;}
  .badges{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px;}
  .badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;}
  .badge.confirmed{background:var(--confirmed-bg);color:var(--confirmed-fg);}
  .badge.included{background:var(--included-bg);color:var(--included-fg);}
  .badge.price{background:var(--price-bg);color:var(--price-fg);}
  .item .notes{margin-top:6px;font-size:13px;color:var(--ink-soft);}
  .item.done{opacity:.5;}
  .item.now{background:var(--cream-deep);border-radius:10px;padding:14px 12px 14px 16px;box-shadow:inset 3px 0 0 0 var(--accent);}
  .item.now .title-text::after{content:" · AHORA";font-size:10px;letter-spacing:.06em;font-weight:700;background:var(--accent);color:#fff;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle;}

  .item-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
  .btn-action{font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;border:1.5px dashed var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;transition:background .2s,color .2s;}
  .btn-action:hover{background:var(--cream-deep);color:var(--ink);}

  /* Collapsible block */
  .cblock{margin-top:10px;border-radius:10px;border:1px solid var(--line);overflow:hidden;}
  .cblock-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;user-select:none;background:var(--cream-deep);}
  .cblock-header .cblock-title{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;}
  .cblock-header .cblock-arrow{font-size:11px;color:var(--ink-soft);transition:transform .25s;}
  .cblock-header.collapsed .cblock-arrow{transform:rotate(-90deg);}
  .cblock-body{padding:10px 14px;background:var(--cream-deep);}
  .cblock-body.hidden{display:none;}

  /* Expense inside cblock */
  .expense-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .expense-row label{font-size:12.5px;color:var(--ink-soft);}
  .expense-row input[type=number]{width:72px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:var(--cream);font-size:13px;color:var(--ink);}
  .expense-row select{padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:var(--cream);font-size:12.5px;color:var(--ink);}
  .traveler-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .traveler-checks label{display:flex;align-items:center;gap:4px;font-size:12.5px;background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:3px 10px;cursor:pointer;transition:background .2s;}
  .traveler-checks label:has(input:checked){background:var(--ink);color:#fff;border-color:var(--ink);}
  .traveler-checks input[type=checkbox]{display:none;}
  .exp-total{margin-top:8px;font-size:13px;font-weight:700;color:var(--price-fg);}

  /* Tasks inside cblock */
  .task-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);}
  .task-item:last-of-type{border-bottom:none;}
  .task-item input[type=checkbox]{margin-top:3px;accent-color:var(--teal);width:15px;height:15px;flex-shrink:0;cursor:pointer;}
  .task-item label{font-size:13px;cursor:pointer;flex:1;}
  .task-item.checked label{text-decoration:line-through;opacity:.45;}
  .task-add-row{display:flex;gap:6px;margin-top:8px;}
  .task-add-row input[type=text]{flex:1;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-size:12.5px;color:var(--ink);}
  .task-add-row button{padding:5px 12px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;}

  /* Annotations inside cblock */
  .annotation-item{padding:7px 0;border-bottom:1px dashed var(--line);display:flex;flex-direction:column;gap:4px;}
  .annotation-item:last-of-type{border-bottom:none;}
  .annotation-text{font-size:13px;color:var(--ink);white-space:pre-wrap;}
  .annotation-actions{display:flex;gap:8px;}
  .annotation-actions button{font-size:11.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:transparent;cursor:pointer;color:var(--ink-soft);}
  .annotation-actions button:hover{background:var(--cream);}
  .annotation-edit-area{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-size:13px;color:var(--ink);font-family:inherit;resize:vertical;min-height:60px;}
  .ann-add-row{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
  .ann-add-row textarea{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-size:13px;color:var(--ink);font-family:inherit;resize:vertical;min-height:60px;}
  .ann-add-row button{align-self:flex-end;padding:5px 14px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;}

  /* Global tasks */
  .tasks-global{scroll-margin-top:20px;margin-top:28px;background:var(--cream-deep);border-radius:16px;padding:18px;border:1px solid var(--line);}
  .tasks-global h3{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-size:18px;margin:0 0 14px;color:var(--ink);}
  .task-item-g{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);}
  .task-item-g:last-of-type{border-bottom:none;}
  .task-item-g input[type=checkbox]{margin-top:3px;accent-color:var(--teal);width:16px;height:16px;flex-shrink:0;cursor:pointer;}
  .task-item-g label{font-size:13.5px;cursor:pointer;}
  .task-item-g.checked label{text-decoration:line-through;opacity:.45;}
  .task-add{display:flex;gap:8px;margin-top:12px;}
  .task-add input[type=text]{flex:1;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--cream);font-size:13px;color:var(--ink);}
  .task-add button{padding:7px 14px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
  .tasks-empty{font-size:13px;color:var(--ink-soft);font-style:italic;padding:6px 0;}

  /* Summary */
  .summary-panel{scroll-margin-top:20px;margin-top:32px;background:var(--cream-deep);border-radius:16px;padding:20px 18px;border:1px solid var(--line);}
  .summary-panel h3{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-size:18px;margin:0 0 16px;color:var(--ink);}
  .summary-person{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);}
  .summary-person:last-of-type{border-bottom:none;}
  .summary-person .name{font-weight:700;font-size:14px;}
  .summary-person .amounts{text-align:right;font-size:13px;}
  .summary-person .spaid{color:var(--confirmed-fg);font-weight:600;}
  .summary-person .sowes{color:var(--price-fg);}
  .debts-section{margin-top:20px;}
  .debts-section h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 0 10px;}
  .debt-row{font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;}
  .debt-row:last-child{border-bottom:none;}
  .debt-amount{font-weight:700;color:var(--price-fg);}

  footer{text-align:center;padding:30px 18px 10px;color:var(--ink-soft);font-size:12px;}
  footer .foot-route{font-weight:600;color:var(--ink);margin-bottom:4px;}
</style>
</head>

const expenses={};
const itemTasks={};
const itemAnnotations={};
const globalTasksList=[];
let taskCounter=0;

function toDate(dt){return new Date(dt[0],dt[1],dt[2],dt[3],dt[4]);}
function sameDate(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function uid(){return 't'+(++taskCounter);}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* Collapsible toggle */
function toggleBlock(headerId){
  const hdr=document.getElementById(headerId);
  const body=document.getElementById(headerId+'-body');
  if(!hdr||!body) return;
  const collapsed=hdr.classList.toggle('collapsed');
  body.classList.toggle('hidden',collapsed);
}

/* Export / Import */
function exportData(){
  const blob=new Blob([JSON.stringify({expenses,itemTasks,itemAnnotations,globalTasksList},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='itinerario-datos.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function importData(event){
  const file=event.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.expenses) Object.assign(expenses,data.expenses);
      if(data.itemTasks) Object.assign(itemTasks,data.itemTasks);
      if(data.itemAnnotations) Object.assign(itemAnnotations,data.itemAnnotations);
      if(data.globalTasksList) globalTasksList.splice(0,globalTasksList.length,...data.globalTasksList);
      document.getElementById('app').innerHTML=trip.map(dayHTML).join('');
      restoreAll();
      document.getElementById('globalTasks').innerHTML=globalTasksHTML();
      renderSummary();updateNow();
      alert('✅ Datos importados correctamente');
    }catch(err){alert('Error al importar: '+err.message);}
  };
  reader.readAsText(file);event.target.value='';
}

/* Expense */
function showExpenseBlock(itemId){
  if(!expenses[itemId]) expenses[itemId]={amount:'',payer:TRAVELERS[0],participants:[...TRAVELERS]};
  document.getElementById('btn-exp-'+itemId).style.display='none';
  document.getElementById('exp-cblock-'+itemId).style.display='block';
  renderExpenseBlock(itemId);
}
function renderExpenseBlock(itemId){
  const exp=expenses[itemId]||{amount:'',payer:TRAVELERS[0],participants:[...TRAVELERS]};
  const checks=TRAVELERS.map(t=>`<label><input type="checkbox" data-item="${itemId}" data-traveler="${t}" ${exp.participants.includes(t)?'checked':''}><span>${t}</span></label>`).join('');
  const payerOpts=TRAVELERS.map(t=>`<option value="${t}" ${exp.payer===t?'selected':''}>${t}</option>`).join('');
  const total=exp.amount&&exp.participants.length?(parseFloat(exp.amount)*exp.participants.length).toFixed(2):null;
  const body=document.getElementById('exp-body-'+itemId);if(!body) return;
  body.innerHTML=`<div class="expense-row">
      <label>€/persona</label>
      <input type="number" min="0" step="0.5" placeholder="0.00" value="${exp.amount||''}" oninput="updateExpenseAmount('${itemId}',this.value)">
      <label>Pagó</label>
      <select onchange="updateExpensePayer('${itemId}',this.value)">${payerOpts}</select>
    </div>
    <div class="traveler-checks">${checks}</div>
    <div class="exp-total" id="etotal-${itemId}">${total?`Total: ${total} € (${exp.participants.length} personas)`:''}</div>`;
  body.querySelectorAll('.traveler-checks input').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const t=e.target.dataset.traveler;
      if(e.target.checked){if(!expenses[itemId].participants.includes(t)) expenses[itemId].participants.push(t);}
      else expenses[itemId].participants=expenses[itemId].participants.filter(x=>x!==t);
      refreshExpenseTotal(itemId);renderSummary();
    });
  });
}
function updateExpenseAmount(itemId,v){
  if(!expenses[itemId]) expenses[itemId]={amount:'',payer:TRAVELERS[0],participants:[...TRAVELERS]};
  expenses[itemId].amount=v;refreshExpenseTotal(itemId);renderSummary();
}
function updateExpensePayer(itemId,v){
  if(!expenses[itemId]) expenses[itemId]={amount:'',payer:TRAVELERS[0],participants:[...TRAVELERS]};
  expenses[itemId].payer=v;renderSummary();
}
function refreshExpenseTotal(itemId){
  const exp=expenses[itemId];const el=document.getElementById('etotal-'+itemId);if(!el) return;
  const total=exp&&exp.amount&&exp.participants.length?(parseFloat(exp.amount)*exp.participants.length).toFixed(2):null;
  el.textContent=total?`Total: ${total} € (${exp.participants.length} personas)`:'';
}

function addItemTask(itemId){
  const inp=document.getElementById('itask-input-'+itemId);const text=inp.value.trim();if(!text) return;

function renderAnnotations(itemId){

  const list=document.getElementById('ann-list-'+itemId);if(!list) return;
  list.innerHTML=anns.map(a=>`
    <div class="annotation-item" id="ann-${a.id}">
      <div class="annotation-text">${escHtml(a.text)}</div>
      <div class="annotation-actions">
        <button onclick="editAnnotation('${itemId}','${a.id}')">✏️ Editar</button>
        <button onclick="deleteAnnotation('${itemId}','${a.id}')">🗑️ Eliminar</button>
      </div>
    </div>`).join('');
}
function addAnnotation(itemId){
  const ta=document.getElementById('ann-input-'+itemId);const text=ta.value.trim();if(!text) return;
  if(!itemAnnotations[itemId]) itemAnnotations[itemId]=[];
  itemAnnotations[itemId].push({id:uid(),text});ta.value='';renderAnnotations(itemId);
}
function editAnnotation(itemId,annId){
  const ann=(itemAnnotations[itemId]||[]).find(a=>a.id===annId);if(!ann) return;
  const el=document.getElementById('ann-'+annId);if(!el) return;
  el.innerHTML=`<textarea class="annotation-edit-area" id="ann-edit-${annId}">${escHtml(ann.text)}</textarea>
    <div class="annotation-actions">
      <button onclick="saveAnnotation('${itemId}','${annId}')">💾 Guardar</button>
      <button onclick="renderAnnotations('${itemId}')">✖ Cancelar</button>
    </div>`;
}
function saveAnnotation(itemId,annId){
  const ta=document.getElementById('ann-edit-'+annId);if(!ta) return;
  const ann=(itemAnnotations[itemId]||[]).find(a=>a.id===annId);
  if(ann) ann.text=ta.value.trim();
  renderAnnotations(itemId);
}
function deleteAnnotation(itemId,annId){
  if(!itemAnnotations[itemId]) return;
  itemAnnotations[itemId]=itemAnnotations[itemId].filter(a=>a.id!==annId);
  renderAnnotations(itemId);
  if(!itemAnnotations[itemId].length){
    document.getElementById('ann-cblock-'+itemId).style.display='none';
    document.getElementById('btn-ann-'+itemId).style.display='';
  }
}

function cblock(id, title, bodyHTML, visible=true){

      <span class="cblock-arrow">▼</span>
    </div>
    <div class="cblock-body" id="${id}-hdr-body">${bodyHTML}</div>
  </div>`;
}

function itemHTML(it){
  let meta=[];
  if(it.p){const addr=it.gp?`<a href="${gmaps(it.gp)}" target="_blank" rel="noopener">${it.p}</a>`:it.p;meta.push(`<span>📍 ${addr}</span>`);}
  if(it.ph) meta.push(`<span>📞 <a href="tel:${it.ph}">${it.ph}</a></span>`);
  if(it.w) meta.push(`<span>🌐 <a href="${it.w}" target="_blank" rel="noopener">${it.wl}</a></span>`);
  let badges=[];
  if(it.st) badges.push(`<span class="badge ${it.st.c}">${it.st.c==='confirmed'?'✅':'🎫'} ${it.st.l}</span>`);
  if(it.pr) badges.push(`<span class="badge price">💶 ${it.pr}</span>`);
  const hasExp=!!expenses[it.id];
  const hasTasks=!!(itemTasks[it.id]&&itemTasks[it.id].length);
  const hasAnns=!!(itemAnnotations[it.id]&&itemAnnotations[it.id].length);

  const expBlock=cblock('exp-cblock-'+it.id,'💶 Gasto',`<div id="exp-body-${it.id}"></div>`,hasExp);
  const taskBlock=cblock('task-cblock-'+it.id,'📌 Tareas',
    `<div id="itask-list-${it.id}"></div>
     <div class="task-add-row">
       <input type="text" id="itask-input-${it.id}" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter') addItemTask('${it.id}')">
       <button onclick="addItemTask('${it.id}')">Añadir</button>
     </div>`,hasTasks);
  const annBlock=cblock('ann-cblock-'+it.id,'📝 Anotaciones',
    `<div id="ann-list-${it.id}"></div>
     <div class="ann-add-row">
       <textarea id="ann-input-${it.id}" placeholder="Escribe una anotación..."></textarea>
       <button onclick="addAnnotation('${it.id}')">Añadir</button>
     </div>`,hasAnns);

  return `<div class="item" id="item-${it.id}">
    <div class="node">${it.i}</div>
    <div class="title"><span class="time-tag">${it.t}</span><span class="title-text">${it.h}</span></div>
    ${meta.length?`<div class="meta-row">${meta.join('')}</div>`:''}
    ${badges.length?`<div class="badges">${badges.join('')}</div>`:''}
    ${it.n?`<div class="notes">${it.n}</div>`:''}
    <div class="item-actions">
      <button class="btn-action" id="btn-exp-${it.id}" onclick="showExpenseBlock('${it.id}')" style="${hasExp?'display:none':''}">+ Gasto</button>
      <button class="btn-action" id="btn-task-${it.id}" onclick="showItemTasks('${it.id}')" style="${hasTasks?'display:none':''}">+ Tarea</button>
      <button class="btn-action" id="btn-ann-${it.id}" onclick="showAnnotationBlock('${it.id}')" style="${hasAnns?'display:none':''}">+ Anotación</button>
    </div>
    ${expBlock}${taskBlock}${annBlock}
  </div>`;
}

/* Summary */
function renderSummary(){
  const paid={},owed={};TRAVELERS.forEach(t=>{paid[t]=0;owed[t]=0;});
  Object.values(expenses).forEach(exp=>{
    if(!exp.amount||!exp.participants.length) return;
    const pp=parseFloat(exp.amount);
    paid[exp.payer]=(paid[exp.payer]||0)+pp*exp.participants.length;
    exp.participants.forEach(t=>{owed[t]=(owed[t]||0)+pp;});
  });
  const balance={};TRAVELERS.forEach(t=>{balance[t]=(paid[t]||0)-(owed[t]||0);});
  const cc=TRAVELERS.filter(t=>balance[t]>0.01).map(t=>({name:t,amt:balance[t]})).sort((a,b)=>b.amt-a.amt);
  const dd=TRAVELERS.filter(t=>balance[t]<-0.01).map(t=>({name:t,amt:-balance[t]})).sort((a,b)=>b.amt-a.amt);
  const debts=[];let ci=0,di=0;
  const c=cc.map(x=>({...x})),d=dd.map(x=>({...x}));
  while(ci<c.length&&di<d.length){
    const amt=Math.min(c[ci].amt,d[di].amt);
    if(amt>0.01) debts.push({from:d[di].name,to:c[ci].name,amt});
    c[ci].amt-=amt;d[di].amt-=amt;
    if(c[ci].amt<0.01) ci++;if(d[di].amt<0.01) di++;
  }
  const total=Object.values(paid).reduce((a,b)=>a+b,0);
  document.getElementById('summaryAnchor').innerHTML=`<div class="summary-panel">
    <h3>💰 Resumen de gastos</h3>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;">Total del viaje: <strong>${total.toFixed(2)} €</strong></div>
    ${TRAVELERS.map(t=>`<div class="summary-person"><div class="name">${t}</div><div class="amounts"><div class="spaid">Pagó: ${(paid[t]||0).toFixed(2)} €</div><div class="sowes">Gasto: ${(owed[t]||0).toFixed(2)} €</div></div></div>`).join('')}
    <div class="debts-section"><h4>Quién le debe a quién</h4>
    ${debts.length?debts.map(d=>`<div class="debt-row"><span>${d.from} → ${d.to}</span><span class="debt-amount">${d.amt.toFixed(2)} €</span></div>`).join(''):'<div style="font-size:13px;color:var(--ink-soft)">¡Todo en orden! Sin deudas pendientes.</div>'}
    </div></div>`;
}

/* Timeline */
const flatItems=trip.flatMap(d=>d.items);
const itemEls=Array.from(document.querySelectorAll('.timeline .item'));
const ribbonFill=document.getElementById('ribbonFill');
const stopEls=Array.from(document.querySelectorAll('.ribbon-track .stop'));
const statusEl=document.getElementById('status');
function updateNow(){
  const now=new Date();
  const passed=ribbonStops.filter(s=>toDate(s.dt)<=now).length;
  stopEls.forEach((el,i)=>{el.classList.remove('visited','current','pending');el.classList.add(i<passed?'visited':(i===passed?'current':'pending'));});
  ribbonFill.style.width=`calc((100% - 44px) * ${Math.max(0,Math.min(1,passed/(ribbonStops.length-1)))})`;
  let cur=-1;
  flatItems.forEach((it,i)=>{if(toDate(it.dt)<=now) cur=i;});
  if(cur===flatItems.length-1&&(now-toDate(flatItems[cur].dt))>3*3600000) cur=flatItems.length;
  itemEls.forEach((el,i)=>{el.classList.toggle('done',i<cur);el.classList.toggle('now',i===cur);});
  navLinks.forEach((a,i)=>{a.classList.toggle('today',sameDate(now,toDate(trip[i].items[0].dt)));});
  const s=toDate(ribbonStops[0].dt),e=toDate(ribbonStops[ribbonStops.length-1].dt);
  let msg='';
  if(now<s){const days=Math.ceil((s-now)/86400000);msg=days<=0?'¡Hoy empieza el viaje! 🚗':(days===1?'El viaje empieza mañana 🚗':`Faltan ${days} días para el viaje`);}
  else if(now>e){msg='Viaje terminado — ¡a descansar! 🏁';}
  else{const di=trip.findIndex(d=>sameDate(now,toDate(d.items[0].dt)));msg=di>=0?`Día ${di+1} de ${trip.length} del viaje`:'';}
  statusEl.textContent=msg;
}
updateNow();
setInterval(updateNow,60000);
</script>
</body>
